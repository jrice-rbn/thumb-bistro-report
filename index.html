<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e4e4e7;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:48px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.login-box h1{font-size:28px;font-weight:700;color:#f59e0b;margin-bottom:8px}
.login-box p{color:#9ca3af;font-size:14px;margin-bottom:24px}
.input-group{margin-bottom:16px}
.input-group input{width:100%;padding:14px 16px;border:1px solid #2a2d3a;border-radius:8px;background:#0f1117;color:#e4e4e7;font-size:16px;outline:none;transition:border-color .2s}
.input-group input:focus{border-color:#f59e0b}
.btn{width:100%;padding:14px;border:none;border-radius:8px;background:#f59e0b;color:#0f1117;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#d97706}
.error{color:#ef4444;font-size:13px;margin-top:12px;display:none}
.logo{font-size:48px;margin-bottom:16px}
</style>
</head>
